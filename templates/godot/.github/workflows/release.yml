name: Godot App Release

on:
  workflow_dispatch:

env:
  pname: new-godot-project # package name; preferably in kebab-case; WARN: MUST BE THE SAME AS THE PNAME ON THE FLAKE.NIX
  version: 1.0.0 # game version; will be fetched from project.godot
  name: New Godot Game # game human-readable name; will be fetched from project.godot
  extra-channel: '["stable"]' # extra channel names for the itch.io butler upload; eg. username/new-godot-project:linux-stable; should be a valid json array
  itch-user: "" # itch.io username; self-explanatory

defaults:
  run:
    shell: nu {0}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        preset: [linux, windows, web] # include here all needed presets

    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: hustcer/setup-nu@v3
        with:
          version: "0.112.2"
          enable-plugins: true

      - name: Get Info
        run: |
          $env.pname = open flake.nix | str replace -ra '(?s).*pname = "(?<pname>\S+)";.*' '$pname' | default $env.pname
          $env.preset = "${{matrix.preset}}"
          $env.version = open project.godot | from ini | get application?.'config/version'? | default $env.version? | default '1.0.0'
          $env.name = open project.godot | from ini | get application?.'config/name'? | default $env.name? | default 'New Godot Game'
          $"pname=($env.pname)
          preset=($env.preset)
          name=($env.name)
          version=($env.version)" | save -a $env.GITHUB_ENV

      - name: Build ${{matrix.preset}} preset
        run: nix build .#${{matrix.preset}}

      - name: preparing zips
        run: |
          mkdir -v ./out/($env.pname)
          cp -rv ./result/share/($env.pname)/* ./out/($env.pname)
          cd ./out/($env.pname)
          ^zip ../($env.pname)-($env.preset).zip *

      - name: Upload package to GitHub release
        uses: ncipollo/release-action@v1.20.0
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ./out/${{env.pname}}-${{matrix.preset}}.zip
          artifactContentType: zip
          bodyFile: ./bodyfile.md
          tag: ${{ env.version }}
          name: "${{ env.name }} ${{ env.version }}"

      - name: setup butler
        if: env.itch-user != ''
        uses: remarkablegames/setup-butler@v2
        with:
          butler-version: LATEST

      - name: upload to itch
        if: env.itch-user != ''
        run: |
          let extra-channel = $env.extra-channel | from json
          ^butler push \
            --fix-permissions \
            --userversion=$env.version \
            ./out/($env.pname) \
            [$"($env.itch-user)/($env.pname):($env.preset)" ...$extra-channel] | str join "-"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
